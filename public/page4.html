
<!DOCTYPE html>
<html>
  <head>
    <title>Welcome — Versa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
      @font-face { font-family: 'Brother1816'; src: url('brother1816-medium.otf') format('opentype'); }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        height: 100vh;
        font-family: 'Brother1816', Arial, sans-serif;
        overflow: hidden;
        padding: 40px 24px 36px;
      }

      /* Small logo top centre */
      #logoWrap {
        width: 120px; overflow: hidden; height: 42px; flex-shrink: 0;
      }
      #logoWrap img { width: 100%; display: block; }

      /* Giant poster text */
      #message {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        text-align: center;
        gap: 0;
      }

      #greeting {
        font-size: 22vw;
        font-weight: 900;
        text-transform: uppercase;
        color: #8B0000;
        line-height: 0.85;
        letter-spacing: -0.01em;
        width: 100%;
      }

      #nameText {
        font-size: 16vw;
        font-weight: 900;
        text-transform: uppercase;
        color: #8B0000;
        line-height: 0.9;
        letter-spacing: -0.01em;
        width: 100%;
        word-break: break-word;
      }

      /* Close button */
      button {
        flex-shrink: 0;
        padding: 16px 44px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        border: 2px solid #1a1a1a;
        background: transparent;
        color: #1a1a1a;
        font-family: inherit;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s, color 0.15s;
      }
      button:active { background: #1a1a1a; color: white; }
    </style>
  </head>
  <body>
    <div id="logoWrap"><img src="Versa Logo.png" alt="Versa"></div>

    <div id="message">
      <div id="greeting"></div>
      <div id="nameText"></div>
    </div>

    <button onclick="goHome()">Close</button>

    <script>
      const greetings = [
        'Hello', 'Hi', 'Hey', 'Bonjour', 'Hola',
        'Ciao', 'Welcome', 'Good to see you', 'Alright', 'Now then'
      ];

      const greeting = greetings[Math.floor(Math.random() * greetings.length)];
      const name = sessionStorage.getItem('visitorName') || 'there';

      document.getElementById('greeting').textContent = greeting + ',';
      document.getElementById('nameText').textContent = name + '.';

      // Scale down font if name is very long
      const nameEl = document.getElementById('nameText');
      if (name.length > 10) nameEl.style.fontSize = '11vw';
      if (name.length > 16) nameEl.style.fontSize = '8vw';

      function goHome() { window.location.href = 'index.html'; }
      setTimeout(goHome, 4000);
    </script>
  </body>
</html>
